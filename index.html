<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVIT8 - AI Cooking Planner</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appBg: '#0E1117',
                        appCard: '#161a23',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-appBg text-white font-sans antialiased min-h-screen">

    <!-- Top Navigation Header -->
    <header class="py-12 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3">LEVIT8 - AI Cooking Planner</h1>
        <p class="text-gray-400 text-lg md:text-xl font-medium">Weightless AI Meal Prep & Checklists</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-16">

        <!-- Section 1: Configure Your Constraints -->
        <section class="bg-appCard rounded-2xl shadow-2xl p-8 mb-8 border border-gray-800">
            <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-4">1. Configure Your Constraints</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <!-- Left Column -->
                <div class="flex flex-col">
                    <label for="api-key" class="text-sm font-semibold text-gray-300 mb-2">Gemini API Key</label>
                    <input type="password" id="api-key" placeholder="Enter your Gemini API Key..."
                        class="w-full bg-appBg border border-gray-700 rounded-lg p-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all shadow-inner mb-4">

                    <label for="day-description" class="text-sm font-semibold text-gray-300 mb-2">How heavy is your
                        day?</label>
                    <textarea id="day-description" rows="5"
                        class="w-full bg-appBg border border-gray-700 rounded-lg p-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all resize-none shadow-inner"
                        placeholder="e.g., Back-to-back meetings, exhausted evening, gym late..."></textarea>
                </div>

                <!-- Right Column -->
                <div class="flex flex-col justify-between space-y-6">
                    <div class="flex flex-col">
                        <label for="budget" class="text-sm font-semibold text-gray-300 mb-2">Daily Budget Limit
                            (₹)</label>
                        <input type="number" id="budget" value="2000" min="0" step="50"
                            class="w-full bg-appBg border border-gray-700 rounded-lg p-4 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all shadow-inner">
                    </div>
                    <div class="flex flex-col">
                        <label for="diet" class="text-sm font-semibold text-gray-300 mb-2">Dietary Restrictions
                            (Optional)</label>
                        <input type="text" id="diet" placeholder="e.g., Vegan, Gluten-free, Nut allergy..."
                            class="w-full bg-appBg border border-gray-700 rounded-lg p-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all shadow-inner">
                    </div>
                </div>
            </div>

            <!-- Large Full Width Call-to-Action Button -->
            <button id="generate-btn"
                class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-4 px-8 rounded-xl text-xl shadow-lg transform transition-all hover:-translate-y-1 hover:shadow-cyan-500/25 active:translate-y-0 focus:outline-none focus:ring-4 focus:ring-cyan-500/50">
                🚀 Levitate My Meal Plan
            </button>
        </section>

        <!-- Hidden Loading State Spinner Component -->
        <div id="loading-state" class="hidden flex-col items-center justify-center py-12">
            <svg class="animate-spin h-12 w-12 text-cyan-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="text-gray-400 text-lg font-medium animate-pulse">Calculating weightless recipes...</p>
        </div>

        <!-- Hidden Results Placeholder Section -->
        <section id="results-section" class="hidden bg-appCard rounded-2xl shadow-xl p-8 border border-gray-800">
            <h2 class="text-2xl font-bold mb-6 border-b border-gray-700 pb-4">2. Your Weightless Plan & To-Do List</h2>

            <div id="results-content" class="prose prose-invert max-w-none text-gray-300">
                <p class="text-gray-400">Your AI-generated meal plan, grocery checklists, and budget analysis will
                    levitate here soon.</p>
            </div>
        </section>

    </main>

    <!-- Application Logic -->
    <script>
        const generateBtn = document.getElementById('generate-btn');
        const loadingState = document.getElementById('loading-state');
        const resultsSection = document.getElementById('results-section');
        const resultsContent = document.getElementById('results-content');

        generateBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('api-key').value.trim();
            const dayDesc = document.getElementById('day-description').value.trim();
            const budget = document.getElementById('budget').value.trim();
            const diet = document.getElementById('diet').value.trim();

            if (!apiKey) {
                alert("Please enter your Gemini API Key.");
                return;
            }
            if (!dayDesc) {
                alert("Please describe how heavy your day is.");
                return;
            }

            // Hide results, show loading
            resultsSection.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex'); // Add flex back since it uses flex-col

            const systemInstruction = `You are the Antigravity Meal Planner. Output EXACTLY this standard Markdown structure:

🍳 Effortless Meal Plan
Provide an elegant, tailored Breakfast, Lunch, and Dinner optimized to match the user's available time and energy. List active kitchen prep time for each meal.

🛒 Floating Grocery List
Format strictly as interactive Markdown checkboxes: '- [ ] Item Name (~₹Estimated Price)'.

🔄 Smart Substitutions
Provide 2-3 brilliant ingredient or prep alternatives to cut costs or save time steps based on their busy schedule.

📉 Weightless Budget Feasibility Logic
Total Cost: ₹[X]

Budget Ceiling: ₹[Y]

Verdict: [Strictly write 'FEASIBLE' or 'OVER BUDGET']

Logic: A crisp 2-sentence mathematical explanation validating how the ingredients fit cleanly into their budget ceiling.`;

            let promptText = `My day: ${dayDesc}\nBudget Limit: ₹${budget}`;
            if (diet) {
                promptText += `\nDietary Restrictions: ${diet}`;
            }

            const requestBody = {
                system_instruction: {
                    parts: { text: systemInstruction }
                },
                contents: [{
                    parts: [{ text: promptText }]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Failed to generate plan.");
                }

                // Extract text from Gemini response structure
                const markdownText = data.candidates[0].content.parts[0].text;

                // Parse markdown to HTML
                resultsContent.innerHTML = marked.parse(markdownText);

                // Make checkboxes interactive and apply strikethrough logic
                const checkboxes = resultsContent.querySelectorAll('input[type="checkbox"]');
                checkboxes.forEach(cb => {
                    cb.removeAttribute('disabled');
                    cb.classList.add('cursor-pointer', 'accent-cyan-500', 'w-5', 'h-5', 'mr-3', 'align-middle');

                    const listItem = cb.closest('li');
                    if (listItem) {
                        listItem.classList.add('transition-all', 'duration-300', 'flex', 'items-center', 'my-2');
                    }

                    cb.addEventListener('change', (e) => {
                        if (listItem) {
                            if (e.target.checked) {
                                listItem.classList.add('text-gray-600', 'line-through');
                                listItem.classList.remove('text-gray-300');
                            } else {
                                listItem.classList.remove('text-gray-600', 'line-through');
                                listItem.classList.add('text-gray-300');
                            }
                        }
                    });
                });

                // Hide loading, show results
                loadingState.classList.remove('flex');
                loadingState.classList.add('hidden');
                resultsSection.classList.remove('hidden');

                // Smooth scroll to results
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error("Error generating plan:", error);
                alert("An error occurred: " + error.message);

                // Reset states
                loadingState.classList.remove('flex');
                loadingState.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
